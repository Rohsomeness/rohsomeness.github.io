<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Rohit Das — interactive pixel-art portfolio. Walk around, explore projects, music, and career planets."
    />
    <meta name="theme-color" content="#0b1020" />
    <title>Rohit Das — Explore</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="game-container"></div>
      <div id="hud">
        <div id="zone-label">—</div>
        <button id="help-btn" type="button" aria-label="Help">?</button>
      </div>
      <div id="prompt" class="hidden">Press E / tap A</div>
      <div id="panel" class="hidden" role="dialog" aria-modal="true">
        <div id="panel-inner">
          <button id="panel-close" type="button" aria-label="Close">×</button>
          <h2 id="panel-title"></h2>
          <p id="panel-meta" class="meta"></p>
          <div id="panel-body"></div>
          <div id="panel-links"></div>
        </div>
      </div>
      <div id="help-overlay" class="hidden">
        <div class="help-card">
          <h2>How to explore</h2>
          <ul>
            <li><strong>Move</strong> — Arrow keys / WASD, or on-screen pad</li>
            <li><strong>Interact</strong> — E / Space, or A button</li>
            <li><strong>Career</strong> — Board the ship, fly up past job planets</li>
            <li><strong>Close panels</strong> — Esc or ×</li>
          </ul>
          <p class="hint">Visit Projects, Music, Story, and the Launch Pad.</p>
          <button id="help-close" type="button">Got it</button>
        </div>
      </div>
      <div id="mobile-controls" class="hidden" aria-hidden="true">
        <div id="dpad">
          <button data-dir="up" type="button">▲</button>
          <div class="mid">
            <button data-dir="left" type="button">◀</button>
            <button data-dir="down" type="button">▼</button>
            <button data-dir="right" type="button">▶</button>
          </div>
        </div>
        <button id="btn-a" type="button">A</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
